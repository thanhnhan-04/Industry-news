name: Update industry dashboard

on:
  schedule:
    # 16:45 Asia/Ho_Chi_Minh, after the Vietnam market close.
    - cron: "45 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-industry-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Ho_Chi_Minh
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh data
        run: bash ./run_auto_update.sh

      - name: Build GitHub Pages artifact
        run: python export_index.py

      - name: Show update logs
        if: always()
        run: |
          test -f logs/quant_update.log && tail -n 120 logs/quant_update.log || true
          test -f logs/news_update.log && tail -n 120 logs/news_update.log || true

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-*.js index.html
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git commit -m "Auto update industry dashboard"
          git push
