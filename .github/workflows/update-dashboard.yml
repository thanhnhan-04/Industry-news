name: Update industry dashboard

on:
  schedule:
    # News scan every 30 minutes so the public dashboard catches new headlines quickly.
    - cron: "*/30 * * * *"
    # 16:45 Asia/Ho_Chi_Minh on weekdays, after the Vietnam market close.
    - cron: "45 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - news

permissions:
  contents: write

concurrency:
  group: update-industry-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Ho_Chi_Minh
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh data
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          DISPATCH_MODE: ${{ github.event.inputs.mode || '' }}
        run: |
          if [ "$DISPATCH_MODE" = "news" ] || [ "$EVENT_SCHEDULE" = "*/30 * * * *" ]; then
            echo "Mode: frequent news refresh"
            python news_update.py
          else
            echo "Mode: full refresh"
            bash ./run_auto_update.sh
          fi

      - name: Build GitHub Pages artifact
        run: python export_index.py

      - name: Show update logs
        if: always()
        run: |
          test -f logs/quant_update.log && tail -n 120 logs/quant_update.log || true
          test -f logs/news_update.log && tail -n 120 logs/news_update.log || true

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-*.js index.html
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git commit -m "Auto update industry dashboard"
          git push
